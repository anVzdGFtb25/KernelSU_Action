KERNEL_SOURCE=https://github.com/MiCode/Xiaomi_Kernel_OpenSource
KERNEL_SOURCE_BRANCH=clover-o-oss
KERNEL_CONFIG=clover-perf_defconfig
KERNEL_IMAGE_NAME=Image
ARCH=arm64

ENABLE_CLANG=true
USE_AOSP_CLANG=true
AOSP_CLANG_SYSTEM=linux-x86
AOSP_CLANG_BRANCH=android-8.1.0_r81
AOSP_CLANG_VERSION=4053586
USE_CUSTOM_CLANG=false
CUSTOM_CLANG_SOURCE=https://github.com/magojohnji/ZyCromerZ-Clang.git
CUSTOM_CLANG_BRANCH=main

ENABLE_GCC=true
ENABLE_AOSP_GCC_ARM64=false
ENABLE_AOSP_GCC_ARM32=false
AOSP_GCC_SYSTEM=linux-x86
AOSP_GCC_ARM64_VERSION=aarch64-linux-android-4.9
AOSP_GCC_ARM32_VERSION=arm-linux-androideabi-4.9
AOSP_GCC_ANDROID_VERSION=android-8.1.0
AOSP_GCC_RELEASE=_r81
USE_CUSTOM_GCC_64=true
CUSTOM_GCC_64_SOURCE=https://github.com/anVzdGFtb25/aarch64-linux-android-4.9.git
CUSTOM_GCC_64_BRANCH=main
CUSTOM_GCC_64_BIN=aarch64-linux-android-
USE_CUSTOM_GCC_32=true
CUSTOM_GCC_32_SOURCE=https://github.com/anVzdGFtb25/arm-linux-androideabi-4.9.git
CUSTOM_GCC_32_BRANCH=main
CUSTOM_GCC_32_BIN=arm-linux-androideabi-

ENABLE_KERNELSU=false
KERNELSU_INSTALLER=
KERNELSU_TAG=main
KSU_EXPECTED_SIZE=
KSU_EXPECTED_HASH=
BUILD_KERNELSU_BOOT_IMG=false
KERNELSU_SOURCE_BOOT_IMAGE=

DISABLE-LTO=false
DISABLE_CC_WERROR=false
ADD_KPROBES_CONFIG=false
ADD_OVERLAYFS_CONFIG=true
ENABLE_CCACHE=false
NEED_DTBO=false
BUILDER_HOST=Github-Action

TC_CUSTOM_CMDS:CLANG_TRIPLE=aarch64-linux-gnu-
EXTRA_CMDS:LD=ld.lld
